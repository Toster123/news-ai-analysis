networks:
  dev:

volumes:
  postgres_data:

services:  
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - YOUR_ENV=&{MY_PROJECT_ENV}
    ports:
      - 8000:8000
    command: >
      sh -c "poetry run uvicorn src.news_ai_analysis.main:app --host 0.0.0.0 --port 8000 --reload" 
    env_file:
      - .env
    networks:
      - dev

  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - .env
    ports:
     - "${POSTGRES_PORT}:5432"
    volumes:
     - postgres_data:/var/lib/postgresql
    networks:
      - dev
